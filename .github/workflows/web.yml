name: Trigger Web Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  WEB_REPO_OWNER: ChiChou
  WEB_REPO_NAME: entdb
  DEPLOY_WORKFLOW_ID: deploy.yml
  DEPLOY_REF: main

jobs:
  dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy workflow in web repository
        env:
          GH_TOKEN: ${{ secrets.ENTDB_WEB_PAT }}
        run: |
          gh api \
            -X POST \
            "repos/${WEB_REPO_OWNER}/${WEB_REPO_NAME}/actions/workflows/${DEPLOY_WORKFLOW_ID}/dispatches" \
            -f ref="${DEPLOY_REF}" \
            -f inputs[source_repo]="${GITHUB_REPOSITORY}" \
            -f inputs[source_sha]="${{ github.event_name == 'release' && github.event.release.target_commitish || github.sha }}" \
            -f inputs[source_ref]="${{ github.event_name == 'release' && github.event.release.target_commitish || github.ref_name }}" \
            -f inputs[source_release_tag]="${{ github.event_name == 'release' && github.event.release.tag_name || '' }}"
