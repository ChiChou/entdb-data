name: Trigger Web Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  WEB_REPO_OWNER: ChiChou
  WEB_REPO_NAME: entdb
  DISPATCH_EVENT_TYPE: data-updated

jobs:
  dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger web repository build
        env:
          GH_TOKEN: ${{ secrets.ENTDB_WEB_PAT }}
        run: |
          gh api "repos/${WEB_REPO_OWNER}/${WEB_REPO_NAME}/dispatches" \
            -f event_type="${DISPATCH_EVENT_TYPE}" \
            -f client_payload[source_repo]="${GITHUB_REPOSITORY}" \
            -f client_payload[source_sha]="${{ github.event_name == 'release' && github.event.release.target_commitish || github.sha }}" \
            -f client_payload[source_ref]="${{ github.event_name == 'release' && github.event.release.target_commitish || github.ref_name }}" \
            -f client_payload[source_release_tag]="${{ github.event_name == 'release' && github.event.release.tag_name || '' }}"