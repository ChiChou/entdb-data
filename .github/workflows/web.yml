name: Trigger Web Build

on:
  workflow_run:
    workflows: ["Build and Release Data"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

env:
  WEB_REPO_OWNER: ChiChou
  WEB_REPO_NAME: entdb-web
  DISPATCH_EVENT_TYPE: data-updated

jobs:
  dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger web repository build
        env:
          GH_TOKEN: ${{ secrets.ENTDB_WEB_PAT }}
        run: |
          gh api "repos/${WEB_REPO_OWNER}/${WEB_REPO_NAME}/dispatches" \
            -f event_type="${DISPATCH_EVENT_TYPE}" \
            -f client_payload[source_repo]="${GITHUB_REPOSITORY}" \
            -f client_payload[source_sha]="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}" \
            -f client_payload[source_ref]="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}"