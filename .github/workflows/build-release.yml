name: Build and Deploy Data

on:
  push:
    branches: [main]
    paths:
      - "groups.json"
      - "iOS/**"
      - "mac/**"
      - "osx/**"
      - "scripts/**"
      - ".github/workflows/build-release.yml"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download previous release
        id: previous
        run: |
          mkdir -p previous
          if gh release download --pattern "data.tar.gz" --pattern "ent.db" -D previous 2>/dev/null; then
            cd previous && tar -xzf data.tar.gz && rm data.tar.gz
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "No previous release found, doing full build"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build artifacts (incremental)
        timeout-minutes: 50
        run: |
          ARGS="-o build-output"
          if [ "${{ steps.previous.outputs.found }}" = "true" ]; then
            ARGS="$ARGS --previous previous"
          fi
          python -u scripts/build.py $ARGS

      - name: Package artifacts
        run: |
          cd build-output
          tar -czf ../data.tar.gz --exclude=ent.db .
          cp ent.db ../ent.db

      - name: Create release
        run: |
          TAG="$(date -u +%Y-%m-%d)"
          if gh release view "$TAG" >/dev/null 2>&1; then
            SEQ=2
            while gh release view "${TAG}-${SEQ}" >/dev/null 2>&1; do
              SEQ=$((SEQ + 1))
            done
            TAG="${TAG}-${SEQ}"
          fi

          gh release create "$TAG" \
            --title "Data Build $TAG" \
            --notes "Auto-built from latest data." \
            --latest \
            data.tar.gz ent.db
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build-output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

